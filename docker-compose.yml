services:
  postgres:
    image: postgres:16-alpine
    container_name: selara-postgres
    environment:
      POSTGRES_DB: selara
      POSTGRES_USER: selara
      POSTGRES_PASSWORD: selara
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selara -d selara"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - selara_pg_data:/var/lib/postgresql/data
    networks:
      - selara_internal

  redis:
    image: redis:7-alpine
    container_name: selara-redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - selara_redis_data:/data
    networks:
      - selara_internal

  app:
    image: ${SELARA_IMAGE:-selara:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: selara-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${SELARA_DATABASE_URL:-postgresql+asyncpg://selara:selara@postgres:5432/selara}
      REDIS_URL: ${SELARA_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:${WEB_PORT:-8080}"
    networks:
      - selara_internal
      - edge

volumes:
  selara_pg_data:
  selara_redis_data:

networks:
  selara_internal:
  edge:
    external: true
