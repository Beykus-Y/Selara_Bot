name: Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract app Docker metadata
        id: meta_app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ secrets.GHCR_USERNAME }}/selara
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta_app.outputs.tags }}
          labels: ${{ steps.meta_app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract web Docker metadata
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ secrets.GHCR_USERNAME }}/selara-web
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          build-args: |
            VITE_APP_BASE_PATH=/miniapp/
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract gacha Docker metadata
        id: meta_gacha
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ secrets.GHCR_USERNAME }}/selara-gacha
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push gacha image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./gacha/Dockerfile
          push: true
          tags: ${{ steps.meta_gacha.outputs.tags }}
          labels: ${{ steps.meta_gacha.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
