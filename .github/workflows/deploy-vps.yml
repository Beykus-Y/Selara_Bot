name: Deploy To VPS

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi
            web_port="${WEB_PORT:-8080}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose pull app
            docker compose up -d app
            sleep 10
            if [ "$(docker inspect -f '{{.State.Running}}' selara-app 2>/dev/null)" != "true" ]; then
              echo "selara-app is not running after deploy"
              docker logs selara-app --tail 200 || true
              exit 1
            fi
            for attempt in 1 2 3 4 5 6; do
              if docker exec selara-app python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${web_port}/healthz', timeout=5).read()" >/dev/null 2>&1; then
                break
              fi
              if [ "$attempt" -eq 6 ]; then
                echo "healthcheck failed for selara-app"
                docker logs selara-app --tail 200 || true
                exit 1
              fi
              sleep 5
            done
            docker image prune -f
